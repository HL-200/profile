<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slime - Profile</title>
<style>
  @font-face {
    font-family: 'RWBY';
    src: url('RWBY-Z.ttf') format('truetype');
  }
</style>
<style>
  :root {
    --bg-deep: #0a0c14;
    --card-bg: linear-gradient(160deg, #1e1b4b 0%, #2d1b69 40%, #1e3a8a 100%);
    --accent: #a78bfa;
    --accent2: #60a5fa;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --glow: rgba(167, 139, 250, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--bg-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'RWBY', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Animated background */
  .bg-canvas {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(29, 78, 216, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(109, 40, 217, 0.2) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(16, 23, 59, 0.8) 0%, transparent 50%);
    background-color: #07091a;
  }

  /* Floating particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }
  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0;
    animation: twinkle var(--dur) var(--delay) infinite ease-in-out;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: var(--opacity); transform: scale(1); }
  }

  /* Card */
  .card {
    position: relative;
    width: 420px;
    max-width: 95vw;
    border-radius: 24px;
    background: var(--card-bg);
    padding: 48px 36px 36px;
    box-shadow:
      0 0 0 1px rgba(167, 139, 250, 0.15),
      0 32px 64px rgba(0,0,0,0.6),
      0 0 80px rgba(109, 40, 217, 0.15),
      inset 0 1px 0 rgba(255,255,255,0.08);
    animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    transform: translateY(30px);
    opacity: 0;
  }
  @keyframes cardIn {
    to { transform: translateY(0); opacity: 1; }
  }

  /* Shimmer border */
  .card::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 25px;
    background: linear-gradient(135deg, rgba(167,139,250,0.4), transparent 40%, rgba(96,165,250,0.3) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    padding: 1px;
    pointer-events: none;
  }

  /* Avatar */
  .avatar-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
    animation: avatarIn 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  @keyframes avatarIn {
    from { transform: translateY(-20px) scale(0.8); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }
  .avatar-ring {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #a78bfa);
    background-size: 200% 200%;
    animation: ringRotate 3s linear infinite;
    box-shadow: 0 0 20px var(--glow), 0 0 40px rgba(96,165,250,0.15);
  }
  @keyframes ringRotate {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .avatar-ring img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--bg-deep);
  }
  .avatar-placeholder {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: linear-gradient(135deg, #2d1b69, #1e3a8a);
    border: 2px solid var(--bg-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    font-size: 32px;
    color: #a78bfa;
  }

  /* Name */
  .name {
    text-align: center;
    font-family: 'RWBY', serif;
    font-size: 3rem;
    letter-spacing: 0.15em;
    color: #fff;
    text-shadow: 0 0 20px rgba(167,139,250,0.5), 0 2px 4px rgba(0,0,0,0.5);
    margin-bottom: 24px;
    animation: nameIn 0.6s 0.3s both;
  }
  @keyframes nameIn {
    from { opacity: 0; letter-spacing: 0.3em; }
    to { opacity: 1; letter-spacing: 0.15em; }
  }

  /* Status box */
  .status-box {
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
    animation: fadeIn 0.6s 0.4s both;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .status-icon {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }
  .status-text {
    color: var(--muted);
    font-size: 0.85rem;
    font-weight: 400;
    letter-spacing: 0.03em;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px #22c55e;
    animation: pulse 2s infinite;
    flex-shrink: 0;
    margin-left: auto;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(0.85); }
  }

  /* Social links */
  .socials {
    display: flex;
    justify-content: center;
    gap: 16px;
    animation: fadeIn 0.6s 0.5s both;
  }
  .social-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.25s ease;
    text-decoration: none;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .social-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(167,139,250,0.3), rgba(96,165,250,0.2));
    opacity: 0;
    transition: opacity 0.25s;
    border-radius: 50%;
  }
  .social-btn:hover::before { opacity: 1; }
  .social-btn:hover {
    transform: translateY(-4px) scale(1.1);
    box-shadow: 0 8px 20px rgba(167,139,250,0.3);
    border-color: rgba(167,139,250,0.4);
  }
  .social-btn svg {
    width: 20px;
    height: 20px;
    fill: white;
    position: relative;
    z-index: 1;
  }

  /* Views */
  .views {
    position: absolute;
    bottom: 14px;
    left: 16px;
    display: flex;
    align-items: center;
    gap: 5px;
    color: rgba(255,255,255,0.35);
    font-size: 0.75rem;
    letter-spacing: 0.05em;
  }
  .views svg { width: 14px; height: 14px; fill: rgba(255,255,255,0.35); }
</style>
</head>

    dot.style.background = statusColors[status];
    dot.style.boxShadow = `0 0 6px ${statusColors[status]}`;

    const spotify = data.listening_to_spotify ? data.spotify : null;
    const game = data.activities?.find(a => a.type === 0);
    const custom = data.activities?.find(a => a.type === 4);

    if (spotify) {
      text.textContent = `🎵 ${spotify.song} — ${spotify.artist}`;
    } else if (game) {
      text.textContent = `🎮 Playing ${game.name}`;
    } else if (custom?.state) {
      text.textContent = custom.state;
    } else {
      text.textContent = statusLabels[status] || '⚫ Offline';
    }
  }

  let heartbeatInterval = null;

  function connectLanyard() {
    const ws = new WebSocket('wss://api.lanyard.rest/socket');

    ws.onopen = () => {
      text.textContent = 'Connecting...';
    };

    ws.onmessage = (e) => {
      const msg = JSON.parse(e.data);

      // op 1 = Hello (server sends heartbeat interval)
      if (msg.op === 1) {
        const interval = msg.d.heartbeat_interval;

        // Start heartbeat
        if (heartbeatInterval) clearInterval(heartbeatInterval);
        heartbeatInterval = setInterval(() => {
          if (ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ op: 3 }));
          }
        }, interval);

        // Subscribe
        ws.send(JSON.stringify({ op: 2, d: { subscribe_to_id: DISCORD_ID } }));
      }

      // op 0 = Event (presence update)
      if (msg.op === 0) {
        updatePresence(msg.d);
      }
    };

    ws.onclose = () => {
      if (heartbeatInterval) clearInterval(heartbeatInterval);
      text.textContent = 'Reconnecting...';
      setTimeout(connectLanyard, 3000); // reconnect after 3s
    };

    ws.onerror = () => {
      ws.close();
    };
  }

  connectLanyard();
</script>
